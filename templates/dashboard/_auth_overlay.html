<!-- Phase 4: Authentication Overlay (preserves existing dashboard) -->
        <!-- Phase 5C: Enhanced with accessibility -->
        <div id="auth-overlay" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50 hidden" 
             role="dialog" aria-modal="true" aria-labelledby="auth-title" aria-describedby="auth-description">
            <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4">
                <!-- Login Form -->
                <div id="login-form" class="p-6">
                    <div class="text-center mb-6">
                        <h2 id="auth-title" class="text-2xl font-bold text-gray-800">🚀 CTO Lens</h2>
                        <p id="auth-description" class="text-gray-600 mt-2">Phase 3 Authentication Required</p>
                    </div>
                    
                    <div id="auth-error" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4" 
                         role="alert" aria-live="polite"></div>
                    
                    <form onsubmit="handleLogin(event)" aria-label="User login form">
                        <div class="mb-4">
                            <label for="login-email" class="block text-gray-700 text-sm font-bold mb-2">Email</label>
                            <input type="email" id="login-email" name="email" 
                                   class="w-full px-3 py-2 border rounded focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" 
                                   placeholder="admin@example.com" 
                                   required 
                                   aria-describedby="email-help"
                                   autocomplete="email">
                            <div id="email-help" class="text-xs text-gray-500 mt-1">Enter your registered email address</div>
                        </div>
                        
                        <div class="mb-6">
                            <label for="login-password" class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                            <input type="password" id="login-password" name="password"
                                   class="w-full px-3 py-2 border rounded focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200" 
                                   placeholder="Enter password" 
                                   required 
                                   aria-describedby="password-help"
                                   autocomplete="current-password">
                            <div id="password-help" class="text-xs text-gray-500 mt-1">Enter your account password</div>
                        </div>
                        
                        <button type="submit" id="login-button" 
                                class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 focus:ring-2 focus:ring-blue-200 focus:outline-none transition-colors"
                                aria-describedby="login-status">
                            Sign In
                        </button>
                    </form>
                    
                    <div class="mt-4 text-center">
                        <button onclick="showRegisterForm()" class="text-blue-600 hover:underline text-sm">
                            Need an account? Register here
                        </button>
                    </div>

                    <div class="mt-3 text-center">
                        <button type="button" onclick="cancelAuth()" class="text-gray-500 hover:text-gray-700 hover:underline text-sm">
                            &larr; Cancel and return to home
                        </button>
                    </div>
                    
                    <div class="mt-6 text-center">
                        <p class="text-xs text-gray-500">Test Account: admin@example.com / admin123</p>
                    </div>
                </div>
                
                <!-- Register Form (hidden by default) -->
                <div id="register-form" class="p-6 hidden">
                    <div class="text-center mb-6">
                        <h2 class="text-2xl font-bold text-gray-800">Create Account</h2>
                        <p class="text-gray-600 mt-2">Register for CTO Lens</p>
                    </div>
                    
                    <div id="register-error" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4"></div>
                    
                    <form onsubmit="handleRegister(event)">
                        <div class="mb-4">
                            <label class="block text-gray-700 text-sm font-bold mb-2">Display Name</label>
                            <input type="text" id="register-name" class="w-full px-3 py-2 border rounded focus:outline-none focus:border-blue-500" placeholder="Your Name" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
                            <input type="email" id="register-email" class="w-full px-3 py-2 border rounded focus:outline-none focus:border-blue-500" placeholder="your@email.com" required>
                        </div>
                        
                        <div class="mb-6">
                            <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                            <input type="password" id="register-password" class="w-full px-3 py-2 border rounded focus:outline-none focus:border-blue-500" placeholder="Enter password" required>
                        </div>
                        
                        <button type="submit" id="register-button" class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700 transition-colors">
                            Create Account
                        </button>
                    </form>
                    
                    <div class="mt-4 text-center">
                        <button onclick="showLoginForm()" class="text-blue-600 hover:underline text-sm">
                            Already have an account? Sign in
                        </button>
                    </div>

                    <div class="mt-3 text-center">
                        <button type="button" onclick="cancelAuth()" class="text-gray-500 hover:text-gray-700 hover:underline text-sm">
                            &larr; Cancel and return to home
                        </button>
                    </div>
                </div>
            </div>
        </div>
