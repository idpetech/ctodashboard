<div class="container mx-auto px-4 py-8">
            <header class="mb-8">
                <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
                    <h1 class="text-4xl font-bold text-blue-600" role="banner">🚀 CTO Lens</h1>
                    <!-- User Info & Logout (shown when authenticated) -->
                    <div id="user-info" class="hidden shrink-0 w-full sm:w-auto">
                        <div class="bg-white rounded-lg shadow p-3 flex flex-wrap items-center gap-2 sm:gap-3">
                            <div class="text-sm min-w-0">
                                <div class="font-medium text-gray-800 truncate" id="user-display-name"></div>
                                <div class="text-gray-500 truncate" id="user-email"></div>
                            </div>
                            <span id="admin-badge" class="hidden px-2 py-0.5 bg-purple-100 text-purple-800 text-xs font-semibold rounded">Admin</span>
                            <button onclick="showProfileModal()" class="px-3 py-1 bg-blue-100 text-blue-700 rounded text-sm hover:bg-blue-200 whitespace-nowrap">
                                👤 Profile
                            </button>
                            <button onclick="handleLogout()" class="text-red-600 hover:text-red-700 text-sm whitespace-nowrap">
                                Logout
                            </button>
                        </div>
                    </div>
                </div>
                <!-- Workspace Selection (shown when authenticated, multi-workspace only) -->
                <div id="workspace-selector" class="hidden mt-4 w-full max-w-md">
                    <div class="bg-white rounded-lg shadow p-3 min-w-64">
                        <div class="flex justify-between items-center mb-2">
                            <div class="text-sm font-medium text-gray-700">Workspace:</div>
                            <div class="flex space-x-2">
                                <button onclick="showImportMenu()" class="text-purple-600 hover:text-purple-700 text-sm font-medium" title="Import Workspace Data">
                                    📥 Import
                                </button>
                                <button onclick="showExportMenu()" class="text-green-600 hover:text-green-700 text-sm font-medium" title="Export Workspace Data">
                                    📤 Export
                                </button>
                                <button onclick="openWorkspaceSettings()" class="text-blue-600 hover:text-blue-700 text-sm font-medium" title="Configure Workspace Settings">
                                    🛠️ Setup
                                </button>
                            </div>
                        </div>
                        <select id="workspace-select" onchange="handleWorkspaceChange()" class="text-sm border border-gray-300 rounded px-2 py-1 w-full focus:outline-none focus:border-blue-500">
                            <option value="">Select Workspace...</option>
                        </select>
                        <div class="text-xs text-gray-500 mt-1">
                            💡 Click "Setup" for workspace settings, connectors, assignments, and CTOLens schedule
                        </div>
                    </div>
                </div>
            </header>
