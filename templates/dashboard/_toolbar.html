<!-- Trial status banner -->
            <div id="trial-banner" class="hidden mb-4 rounded-lg px-4 py-3 text-sm font-medium" role="status" aria-live="polite"></div>

            <!-- Search trigger button with accessibility and import/export -->
            <div class="mb-6 flex flex-col gap-3 md:flex-row md:justify-between md:items-start" role="toolbar" aria-label="Dashboard controls">
                <div class="flex flex-col sm:flex-row sm:flex-wrap items-stretch sm:items-center gap-2 sm:gap-3 min-w-0 w-full md:w-auto">
                    <!-- Phase 5C: Workspace Setup Indicator -->
                    <div id="workspace-setup-indicator" class="hidden bg-yellow-50 border border-yellow-200 rounded-lg px-3 py-2 text-xs text-yellow-700 w-full sm:w-auto">
                        <span>⚠️ Workspace not configured</span>
                        <button onclick="openWorkspaceSettings()" class="text-yellow-800 hover:text-yellow-900 font-medium ml-2">Setup →</button>
                    </div>
                    <button onclick="showSearchOverlay()" 
                            class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg transition-colors flex items-center justify-center sm:justify-start space-x-2 focus:ring-2 focus:ring-blue-500 focus:outline-none w-full sm:w-auto"
                            aria-label="Open search and filter assignments dialog"
                            aria-describedby="search-shortcut">
                        <span aria-hidden="true">🔍</span>
                        <span>Search & Filter</span>
                        <span id="search-shortcut" class="hidden md:inline text-xs bg-gray-200 px-2 py-1 rounded" aria-label="Keyboard shortcut: Control plus K">Ctrl+K</span>
                    </button>

                    <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
                        <button onclick="openWorkspaceSettings()"
                                class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg transition-colors flex items-center space-x-1 focus:ring-2 focus:ring-blue-500 focus:outline-none flex-1 sm:flex-none justify-center"
                                title="Workspace settings — connectors, client portfolios, assignments, CTOLens schedule"
                                aria-label="Open workspace settings">
                            <span aria-hidden="true">🛠️</span>
                            <span class="text-sm font-medium">Setup</span>
                        </button>

                        <!-- Desktop: all actions visible -->
                        <div class="hidden md:flex items-center gap-2">
                            <button onclick="exportAssignments()" 
                                    class="bg-green-100 hover:bg-green-200 text-green-700 px-3 py-2 rounded-lg transition-colors flex items-center space-x-1 focus:ring-2 focus:ring-green-500 focus:outline-none"
                                    aria-label="Export all assignments to JSON file">
                                <span aria-hidden="true">📤</span>
                                <span class="text-sm">Export</span>
                            </button>
                            <button id="import-assignments-btn" onclick="showImportDialog()" 
                                    class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-2 rounded-lg transition-colors flex items-center space-x-1 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                    aria-label="Import assignments from JSON file">
                                <span aria-hidden="true">📥</span>
                                <span class="text-sm">Import</span>
                            </button>
                            <button onclick="showBackupInfo()" 
                                    class="bg-purple-100 hover:bg-purple-200 text-purple-700 px-3 py-2 rounded-lg transition-colors flex items-center space-x-1 focus:ring-2 focus:ring-purple-500 focus:outline-none"
                                    aria-label="System backup and restore information">
                                <span aria-hidden="true">💾</span>
                                <span class="text-sm">Backup</span>
                            </button>
                        </div>

                        <!-- Mobile / tablet: secondary actions in More menu -->
                        <div class="relative md:hidden flex-1 sm:flex-none">
                            <button type="button"
                                    id="toolbar-more-toggle"
                                    onclick="toggleToolbarMore(event)"
                                    class="w-full sm:w-auto bg-gray-100 hover:bg-gray-200 text-gray-800 px-3 py-2 rounded-lg transition-colors flex items-center justify-center space-x-1 focus:ring-2 focus:ring-gray-400 focus:outline-none"
                                    aria-expanded="false"
                                    aria-controls="toolbar-more-menu"
                                    aria-label="More dashboard actions">
                                <span>More</span>
                                <span aria-hidden="true">▾</span>
                            </button>
                            <div id="toolbar-more-menu"
                                 class="hidden absolute right-0 top-full mt-1 z-30 min-w-[10rem] bg-white border border-gray-200 rounded-lg shadow-lg py-1"
                                 role="menu"
                                 onclick="event.stopPropagation()">
                                <button type="button" role="menuitem" onclick="closeToolbarMore(); exportAssignments();"
                                        class="w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2">
                                    <span aria-hidden="true">📤</span> Export
                                </button>
                                <button type="button" role="menuitem" id="import-assignments-btn-mobile" onclick="closeToolbarMore(); showImportDialog();"
                                        class="w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2">
                                    <span aria-hidden="true">📥</span> Import
                                </button>
                                <button type="button" role="menuitem" onclick="closeToolbarMore(); showBackupInfo();"
                                        class="w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2">
                                    <span aria-hidden="true">💾</span> Backup
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="search-status" class="text-sm text-gray-600 hidden shrink-0" role="status" aria-live="polite">
                    Showing <span id="visible-count">0</span> of <span id="total-count">0</span> assignments
                </div>
            </div>
