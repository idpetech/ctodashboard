<!-- Export Modal - Phase 1 Simple Implementation -->
    <div id="export-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-800">📤 Export Data</h2>
                    <button onclick="hideExportModal()" class="text-gray-500 hover:text-gray-700 text-2xl">&times;</button>
                </div>
                
                <div id="export-message" class="hidden mb-4 p-3 rounded"></div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Export Type</label>
                        <select id="export-type" class="w-full border rounded px-3 py-2">
                            <option value="workspace">Workspace (All Assignments)</option>
                            <option value="assignment">Current Assignment Only</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Format</label>
                        <select id="export-format" class="w-full border rounded px-3 py-2">
                            <option value="json">JSON (Structured Data)</option>
                            <option value="csv">CSV (Spreadsheet)</option>
                        </select>
                    </div>
                    
                    <div class="text-xs text-gray-500">
                        ⚠️ Note: Credentials and sensitive data are never exported for security.
                    </div>
                </div>
                
                <div class="flex justify-end space-x-3 mt-6">
                    <button onclick="hideExportModal()" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</button>
                    <button onclick="executeExport()" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700" id="export-btn">
                        📤 Export
                    </button>
                </div>
            </div>
        </div>
    </div>
