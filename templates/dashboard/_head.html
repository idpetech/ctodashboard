        <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>🚀 CTO Lens - All Services Integrated</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            .loading-spinner {
                border: 2px solid #f3f3f3;
                border-top: 2px solid #3498db;
                border-radius: 50%;
                width: 20px;
                height: 20px;
                animation: spin 1s linear infinite;
                display: inline-block;
                margin-right: 8px;
            }
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
            .tab-button {
                transition: all 0.3s ease;
            }
            .tab-button:hover {
                background-color: #f3f4f6;
            }
            .active-tab {
                border-bottom: 2px solid #3b82f6;
                color: #3b82f6 !important;
                background-color: #f9fafb;
            }
            .tab-content {
                animation: fadeIn 0.3s ease-in-out;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            
            /* Phase 5C: Enhanced Loading States */
            .loading-overlay {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(255, 255, 255, 0.9);
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: inherit;
                z-index: 10;
            }
            
            .pulse-loading {
                animation: pulse 1.5s ease-in-out infinite;
            }
            
            @keyframes pulse {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.5; }
            }
            
            .skeleton-loading {
                background: linear-gradient(90deg, #f0f0f0 25%, transparent 37%, #f0f0f0 63%);
                background-size: 400% 100%;
                animation: skeleton 1.5s ease-in-out infinite;
            }
            
            @keyframes skeleton {
                0% { background-position: 100% 50%; }
                100% { background-position: -100% 50%; }
            }
            
            .progress-bar {
                width: 100%;
                height: 4px;
                background: #e5e7eb;
                border-radius: 2px;
                overflow: hidden;
            }
            
            .progress-bar-fill {
                height: 100%;
                background: linear-gradient(90deg, #3b82f6, #1d4ed8);
                transform: translateX(-100%);
                animation: progress 2s ease-in-out infinite;
            }
            
            @keyframes progress {
                0% { transform: translateX(-100%); }
                50% { transform: translateX(0%); }
                100% { transform: translateX(100%); }
            }
            
            .button-loading {
                position: relative;
                overflow: hidden;
            }
            
            .button-loading::before {
                content: '';
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
                animation: button-shimmer 1.5s infinite;
            }
            
            @keyframes button-shimmer {
                0% { left: -100%; }
                100% { left: 100%; }
            }
            
            /* Phase 5A: Mobile responsiveness fixes */
            @media (max-width: 768px) {
                .assignment-card { margin: 0.5rem; padding: 1rem; }
                .metric-card { margin: 0.25rem; }
                .tab-button { padding: 0.5rem 1rem; font-size: 0.875rem; }
                .workspace-selector { position: relative !important; top: auto !important; left: auto !important; width: 100%; margin: 1rem 0; }
                #auth-overlay .w-full.max-w-md { max-width: 95vw; margin: 1rem; }
                .text-4xl { font-size: 1.875rem; }
                .text-2xl { font-size: 1.5rem; }
                .px-6 { padding-left: 1rem; padding-right: 1rem; }
                .py-4 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
            }

            /* Scrollable assignment tabs on narrow viewports */
            .dashboard-tab-scroll {
                position: relative;
            }
            .dashboard-tab-scroll::after {
                content: '';
                position: absolute;
                top: 0;
                right: 0;
                bottom: 0;
                width: 2rem;
                pointer-events: none;
                background: linear-gradient(to left, rgba(255, 255, 255, 1), rgba(255, 255, 255, 0));
            }
            .dashboard-tab-row {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: thin;
            }
            .dashboard-tab-row .tab-button {
                flex-shrink: 0;
                white-space: nowrap;
            }
            
            /* Phase 5C: Enhanced Mobile Responsiveness */
            
            /* Touch-friendly buttons and interactions */
            @media (max-width: 768px) {
                button, .btn {
                    min-height: 44px; /* Apple's recommended minimum touch target */
                    padding: 12px 16px;
                    font-size: 16px; /* Prevents zoom on iOS */
                }
                
                input, textarea, select {
                    font-size: 16px; /* Prevents zoom on iOS */
                    padding: 12px;
                    border-radius: 8px;
                }
                
                /* Improved modal responsiveness */
                #assignment-edit-modal .bg-white,
                #profile-modal .bg-white {
                    max-width: 95vw;
                    max-height: 90vh;
                    overflow-y: auto;
                    margin: 1rem;
                }
                
                /* Better tab navigation for mobile */
                .assignment-tab-btn {
                    flex: 1;
                    text-align: center;
                    padding: 12px 8px;
                    min-height: 44px;
                }
                
                /* Stack form fields vertically */
                .grid.grid-cols-2 {
                    grid-template-columns: 1fr !important;
                    gap: 1rem;
                }
                
                /* Improved assignment cards */
                .assignment-card {
                    padding: 1.5rem;
                    border-radius: 12px;
                    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
                }
                
                /* Better metrics display */
                .grid.grid-cols-1.md\\:grid-cols-3.lg\\:grid-cols-5 {
                    grid-template-columns: repeat(2, 1fr) !important;
                    gap: 0.75rem;
                }
                
                /* Chatbot positioning */
                #chatbot-button {
                    bottom: 1rem;
                    right: 1rem;
                    z-index: 1000;
                }
                
                #chatbot-modal .bg-white {
                    width: calc(100vw - 2rem);
                    height: calc(100vh - 4rem);
                    max-height: none;
                    margin: 1rem;
                    border-radius: 16px;
                }
                
                /* Improved navigation */
                .container {
                    padding-left: 1rem;
                    padding-right: 1rem;
                }
                
                /* Better loading states */
                .skeleton-loading {
                    border-radius: 8px;
                }
            }
            
            /* Small mobile devices (< 480px) */
            @media (max-width: 480px) {
                .text-4xl {
                    font-size: 1.5rem;
                }
                
                .grid.grid-cols-1.md\\:grid-cols-2.lg\\:grid-cols-3 {
                    gap: 1rem;
                }
                
                /* Single column for very small screens */
                .grid.grid-cols-1.md\\:grid-cols-3.lg\\:grid-cols-5 {
                    grid-template-columns: 1fr !important;
                    gap: 1rem;
                }
                
                /* Compact form layout */
                .assignment-tab-btn {
                    font-size: 14px;
                    padding: 10px 4px;
                }
                
                /* Better modal sizing */
                #assignment-edit-modal .bg-white,
                #profile-modal .bg-white {
                    max-width: 98vw;
                    margin: 0.5rem;
                    padding: 1rem;
                }
            }
            
            /* Landscape orientation adjustments */
            @media (max-height: 500px) and (orientation: landscape) {
                #assignment-edit-modal .bg-white,
                #profile-modal .bg-white {
                    max-height: 95vh;
                    padding: 1rem;
                }
                
                .text-4xl {
                    font-size: 1.5rem;
                    margin-bottom: 1rem;
                }
            }
        </style>
    </head>
