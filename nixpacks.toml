[phases.setup]
nixPkgs = ["python3", "python3Packages.pip"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["echo 'No build step required'"]

[start]
# Ensure NO database initialization runs automatically
cmd = "gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 300 integrated_dashboard:app"